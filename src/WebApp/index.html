    <script>
      (function() {
        const path = window.location.pathname;
        const hash = window.location.hash;

        // If the URL ends with "/" (folder) and not "/index.html"
        if (hash && path.endsWith("/") && !path.endsWith("/index.html")) {
          // Redirect to index.html while preserving the hash
          window.location.replace(path + "index.html" + hash);
        }
      })();
    </script>
