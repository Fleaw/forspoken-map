<!DOCTYPE html>
<html>
  <head>
    <title>Forspoken Map</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Favicon made using https://favicongenerator.io -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <script>
      (function() {
        const path = window.location.pathname;
        const hash = window.location.hash;

        // If the URL ends with "/" (folder) and not "/index.html"
        if (path.endsWith("/") && !path.endsWith("/index.html")) {
          // Redirect to index.html while preserving the hash
          window.location.replace(path + "index.html" + hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="map"></div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
